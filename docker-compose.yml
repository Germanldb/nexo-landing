services:
  web:
    build: .
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://nexo:${MYSQL_PASSWORD:-nexo_secret}@db:3306/clientes_captacion
      PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-lmujica}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-nexo-dev-session-secret}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: clientes_captacion
      MYSQL_USER: nexo
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nexo_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

volumes:
  db_data:
